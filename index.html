<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CVDL Study — Q&A & Theory Explorer</title>
  <meta name="description" content="Interactive Computer Vision & Deep Learning Q&A and Theory explorer with live search. Filter instantly as you type." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div id="item-count" hidden></div>

  <main class="main-content">

    <!-- Tab switcher -->
    <div class="tab-bar" role="tablist" aria-label="Content mode">
      <button class="tab-btn active" id="tab-questions" role="tab" aria-selected="true"  aria-controls="panel-questions" data-mode="questions">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Questions
        <span class="tab-count" id="tab-q-count"></span>
      </button>
      <button class="tab-btn" id="tab-theory" role="tab" aria-selected="false" aria-controls="panel-theory"    data-mode="theory">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        Theory
        <span class="tab-count" id="tab-t-count"></span>
      </button>
    </div>

    <!-- Search Bar -->
    <section class="search-section" aria-label="Search">
      <div class="search-wrapper">
        <span class="search-icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <input
          type="search"
          id="search-input"
          class="search-input"
          placeholder="Search… (live filter)"
          autocomplete="off"
          spellcheck="false"
          aria-label="Live search filter"
        />
        <span class="search-kbd" aria-hidden="true"><kbd>ctrl</kbd>+<kbd>f</kbd> style</span>
        <button class="search-clear" id="search-clear" aria-label="Clear search" hidden>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="search-stats" id="search-stats" aria-live="polite"></div>
    </section>

    <!-- Topic filter pills (collapsible) -->
    <div class="filters-wrapper" id="filters-wrapper">
      <button class="filters-toggle" id="filters-toggle" aria-expanded="false" aria-controls="filters-section">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/></svg>
        <span class="filters-toggle-label">Filter by topic</span>
        <span class="filters-active-count" id="filters-active-count" hidden></span>
        <svg class="filters-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <section class="filters-section" id="filters-section" aria-label="Filter by topic" hidden></section>
    </div>

    <!-- ── QUESTIONS PANEL ── -->
    <div id="panel-questions" role="tabpanel" aria-labelledby="tab-questions">
      <section class="questions-section" id="questions-container" aria-label="Questions list">
        <div class="loading-state" id="loading-questions">
          <div class="spinner"></div>
          <p>Loading questions…</p>
        </div>
      </section>
    </div>

    <!-- ── THEORY PANEL ── -->
    <div id="panel-theory" role="tabpanel" aria-labelledby="tab-theory" hidden>
      <section class="questions-section" id="theory-container" aria-label="Theory concepts list"></section>
    </div>

    <!-- Empty state -->
    <div class="empty-state" id="empty-state" hidden>
      <div class="empty-icon">🔍</div>
      <h2>No matches found</h2>
      <p>Try a different search term or clear the filter.</p>
    </div>
  </main>

  <!-- Answer Modal (questions only) -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="modal-header">
        <span class="modal-topic" id="modal-topic"></span>
        <span class="modal-qid" id="modal-qid"></span>
      </div>
      <h2 class="modal-question" id="modal-title"></h2>
      <ul class="modal-options" id="modal-options"></ul>
      <div class="modal-answer" id="modal-answer">
        <span class="answer-label">✓ Correct Answer</span>
        <span class="answer-text" id="modal-answer-text"></span>
      </div>
      <div class="modal-explanation" id="modal-explanation"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
